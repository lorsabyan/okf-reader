name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: bunx playwright install --with-deps chromium
      - run: bun run e2e
      # Rebuild under a base path (mirrors the GitHub Pages deploy) and run
      # just the regression spec for it — see e2e/basepath.e2e.ts.
      - run: bun run build
        env:
          NEXT_BASE_PATH: /okf-reader
      - run: bunx playwright test e2e/basepath.e2e.ts
        env:
          E2E_BASE_PATH: /okf-reader
